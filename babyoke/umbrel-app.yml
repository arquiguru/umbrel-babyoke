icon: https://raw.githubusercontent.com/arquiguru/umbrel-babyoke/main/babyoke/icon.svg
description: >-
  Babyoke is a full-screen lullaby karaoke web app for babies and toddlers.
  Big friendly buttons launch sing-along arrullos with lyrics synced to the
  melody on any screen: a TV, a tablet, or a phone.


  Version 2 is a complete rebuild: a calm "Linen & Ink" look with night and
  melatonin-safe ember themes, a noise engine (rain, waves, heartbeat, shush,
  pink noise), a guided wind-down routine, voice modes for singing along,
  a blackout screen, baby-name personalization, and mood categories.


  It is a single self-contained static page served by nginx — no login, no
  account, no data collection, and no internet fetches at all. Audio starts
  after your first tap (a mobile-browser rule), and over plain HTTP the
  keep-screen-awake feature is disabled by the browser; the app is otherwise
  fully usable.
