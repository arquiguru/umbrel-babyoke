server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Always revalidate the HTML so updates show up on a normal reload
  # (important on iOS Safari, which caches aggressively).
  location = /index.html {
    add_header Cache-Control "no-cache";
  }

  location / {
    try_files $uri /index.html;
  }
}
