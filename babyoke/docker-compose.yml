services:
  app_proxy:
    environment:
      APP_HOST: babyoke_server_1
      APP_PORT: 80
      # Babyoke is a public, login-free kiosk app meant to open on a TV / tablet
      # browser with NO Umbrel login (a TV browser cannot pass the Umbrel SSO).
      # Whitelist everything so the auth proxy never blocks it.
      # Mirrors the SSO-bypass choice used for larapaper's device API.
      PROXY_AUTH_WHITELIST: "/*"

  server:
    # Stock nginx, pinned by digest (multi-arch index: amd64 + arm64).
    # Re-pin on a version bump with:
    #   docker buildx imagetools inspect nginx:1.27-alpine
    image: nginx:1.27-alpine@sha256:65645c7bb6a0661892a8b03b89d0743208a18dd2f3f17a54ef4b76fb8e2f2a10
    restart: on-failure
    stop_grace_period: 30s
    volumes:
      # The app content (index.html + nginx site config) is bundled inside this
      # store repo under ./content and seeded into the app data dir by the
      # pre-start hook, then mounted here read-only. No registry / image build
      # is needed to ship the content.
      - ${APP_DATA_DIR}/data/site/index.html:/usr/share/nginx/html/index.html:ro
      - ${APP_DATA_DIR}/data/site/default.conf:/etc/nginx/conf.d/default.conf:ro
